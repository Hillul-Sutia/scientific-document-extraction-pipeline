services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    working_dir: /app

    volumes:
      - .:/app
      - uv-cache:/root/.cache/uv

    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      UV_PROJECT_ENVIRONMENT: /opt/venv

    stdin_open: true
    tty: true

    # command: /bin/bash
    command: python main.py

volumes:
  uv-cache: